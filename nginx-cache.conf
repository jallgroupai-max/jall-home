# Cache control para SPA (Vite/React)
# Incluir este archivo dentro del bloque server de nginx:
#   include /var/www/home-master/nginx-cache.conf;   (rama main)
#   include /var/www/home-develop/nginx-cache.conf;  (rama develop)

# index.html: nunca cachear (es el entry point que referencia los assets hasheados)
location ~* \.html$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
}

# Assets de Vite: cachear indefinidamente (Vite les pone hash en el nombre)
# Ejemplo: /assets/index-gFhk0hp0.js
location ~* ^/assets/.*\.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    access_log off;
}

# Archivos estáticos en raíz (favicon, robots.txt, etc): revalidar siempre
location ~* \.(ico|png|txt|xml|json|webmanifest)$ {
    add_header Cache-Control "public, max-age=3600, must-revalidate" always;
}
